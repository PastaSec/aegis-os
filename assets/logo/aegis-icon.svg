      .fill{fill:#f3ead7;}
      .text{fill:#f3ead7;font-family:Arial,Helvetica,sans-serif;font-weight:800;letter-spacing:14px;}
      .small{fill:#f3ead7;font-family:Arial,Helvetica,sans-serif;font-weight:700;letter-spacing:5px;}
    </style>
  </defs>

  <rect class="bg" width="1024" height="1024" rx="96"/>


<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">AEGIS OS Icon</title>
  <desc id="desc">Monochrome AEGIS OS emblem representing knowledge, communication, resilience, Florida coastal identity, and community.</desc>
  <defs>
    <style>
      .bg{fill:#050505;}
      .ink{fill:none;stroke:#f3ead7;stroke-width:34;stroke-linecap:round;stroke-linejoin:round;}

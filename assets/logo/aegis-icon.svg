  <path class="ink2" d="M308 726 V800 C374 774 440 778 512 822 C584 778 650 774 716 800 V726"/>
  <path class="ink2" d="M512 742 V822"/>

  <!-- Florida coastal horizon / water -->
  <path class="ink2" d="M252 846 C300 828 348 864 396 846 C444 828 492 864 540 846 C588 828 636 864 684 846 C732 828 780 864 828 846"/>
  <path class="ink2" d="M298 884 C346 866 394 902 442 884 C490 866 538 902 586 884 C634 866 682 902 730 884"/>

